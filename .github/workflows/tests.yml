# PyGameMaker IDE - Automated Testing Workflow
# Runs tests on every push and pull request

name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  # Allow manual triggering
  workflow_dispatch:

jobs:
  # ============================================================================
  # Unit Tests (Fast, no GUI)
  # ============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libegl1 || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install test deps except pytest-qt (not needed for unit tests)
          pip install pytest pytest-cov pytest-timeout pytest-xdist pytest-mock pytest-asyncio

      - name: Run unit tests
        run: |
          cd tests && python -m pytest test_config.py test_project_manager.py test_asset_manager.py test_integration.py test_exporters.py test_game_runner.py test_action_executor.py -v --tb=long
        env:
          SDL_AUDIODRIVER: dummy
          SDL_VIDEODRIVER: dummy
          QT_QPA_PLATFORM: offscreen

  # ============================================================================
  # Widget Tests (Require Qt and display)
  # ============================================================================
  widget-tests:
    name: Widget Tests (Qt)
    runs-on: ubuntu-latest
    # Job-level safety net: even with pytest-timeout below, give the
    # whole step a hard ceiling so a wedged Xvfb/QtWebEngine can't burn
    # the 6-hour GitHub Actions job limit.
    timeout-minutes: 10
    continue-on-error: true  # Widget tests are optional for now

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1 libxkbcommon0 libasound2-dev libnss3 libxcomposite1 libxdamage1 libxrandr2 libxkbfile1 libxshmfence1 || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-qt pytest-cov pytest-timeout pytest-xdist pytest-mock pytest-asyncio

      - name: Run widget tests with Xvfb
        run: |
          # --timeout=60 (via pytest-timeout) fails any single test that
          # hangs >60s with a traceback, instead of letting the job sit
          # waiting forever (e.g. on QtWebEngineProcess sandbox deadlock).
          # --timeout-method=thread is required for tests that block on
          # C-level calls (Qt's event loop) — the default 'signal' method
          # can't interrupt those.
          cd tests && xvfb-run -a --server-args="-screen 0 1920x1080x24" \
            pytest test_widgets.py -v -m widget --tb=short -o qt_api=pyside6 \
            --timeout=60 --timeout-method=thread || exit_code=$?
          # Exit code 139 is SIGSEGV - ignore it as it's a Qt cleanup issue, not a test failure
          if [ "${exit_code:-0}" -eq 139 ]; then
            echo "Note: Qt WebEngine segfault during cleanup (exit 139) - ignoring"
            exit 0
          fi
          exit ${exit_code:-0}
        env:
          # Qt main process uses 'offscreen' so QApplication starts without
          # a display (the xcb plugin would otherwise SIGABRT under the
          # CI's minimal X stack). xvfb-run still provides a real $DISPLAY
          # for QtWebEngine's Chromium subprocess, which can't initialise
          # without one. Removing 'offscreen' was attempted in the previous
          # commit and broke QApplication setup for every widget test.
          QT_QPA_PLATFORM: offscreen
          SDL_AUDIODRIVER: dummy
          # Chromium's sandbox doesn't work in unprivileged CI containers;
          # without these flags QtWebEngineProcess hangs at init.
          QTWEBENGINE_DISABLE_SANDBOX: '1'
          QTWEBENGINE_CHROMIUM_FLAGS: '--no-sandbox --disable-gpu --disable-dev-shm-usage'

  # ============================================================================
  # Full Integration Tests
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]  # Only run after unit tests pass
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libegl1 libxkbcommon0 libasound2-dev libnss3 libxcomposite1 libxdamage1 libxrandr2 libxkbfile1 libxshmfence1 || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-qt pytest-cov pytest-timeout pytest-xdist pytest-mock pytest-asyncio

      - name: Run all tests with coverage
        run: |
          # See widget-tests job for the --timeout / --no-sandbox rationale.
          cd tests && xvfb-run -a --server-args="-screen 0 1920x1080x24" \
            pytest . -v --tb=short --cov=.. --cov-report=xml --cov-report=term-missing \
            -o qt_api=pyside6 --timeout=60 --timeout-method=thread || exit_code=$?
          # Exit code 139 is SIGSEGV - ignore it as it's a Qt cleanup issue, not a test failure
          if [ "${exit_code:-0}" -eq 139 ]; then
            echo "Note: Qt WebEngine segfault during cleanup (exit 139) - ignoring"
            exit 0
          fi
          exit ${exit_code:-0}
        env:
          # See widget-tests job for the rationale on this env mix:
          # 'offscreen' keeps QApplication from SIGABRTing under CI's
          # minimal X stack while xvfb-run still gives QtWebEngine's
          # Chromium subprocess a real display.
          QT_QPA_PLATFORM: offscreen
          SDL_AUDIODRIVER: dummy
          QTWEBENGINE_DISABLE_SANDBOX: '1'
          QTWEBENGINE_CHROMIUM_FLAGS: '--no-sandbox --disable-gpu --disable-dev-shm-usage'

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # ============================================================================
  # Windows Tests (Optional)
  # ============================================================================
  windows-tests:
    name: Windows Tests
    runs-on: windows-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true  # Don't fail the whole workflow on Windows issues

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-qt pytest-cov pytest-timeout pytest-xdist pytest-mock pytest-asyncio

      - name: Run unit tests
        run: |
          cd tests && pytest test_config.py -v --tb=short
        env:
          SDL_AUDIODRIVER: dummy
          QT_QPA_PLATFORM: offscreen

  # ============================================================================
  # Code Quality Checks
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8 (syntax errors and undefined names only)
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=venv,venv_py312,build,dist,.git,__pycache__,docs,translations
        continue-on-error: true  # Don't fail on existing code issues

      - name: Run flake8 (warnings)
        run: |
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics \
            --exclude=venv,venv_py312,build,dist,.git,__pycache__
        continue-on-error: true
