# PyGameMaker IDE - Cross-Platform Build Workflow
# Builds standalone executables for Windows, macOS, and Linux

name: Build

on:
  # Build on releases (created in the GitHub UI)
  release:
    types: [created]
  # Build whenever a version tag is pushed. The tag-push path also creates
  # a GitHub Release pointing at the tag (see upload-release below) so the
  # artifacts are published automatically without a manual UI step.
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  APP_NAME: 'PyGameMaker'

jobs:
  # ============================================================================
  # Build for Windows
  # ============================================================================
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        timeout-minutes: 30
        run: |
          pyinstaller PyGameMaker.spec

      - name: List build output
        run: |
          Get-ChildItem -Path dist -Recurse

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Windows
          path: dist/${{ env.APP_NAME }}.exe
          if-no-files-found: error

  # ============================================================================
  # Build for macOS (Intel)
  # ============================================================================
  build-macos-intel:
    name: Build macOS (Intel)
    runs-on: macos-15-intel  # Intel-based macOS runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        timeout-minutes: 30
        run: |
          pyinstaller PyGameMaker.spec

      - name: List build output
        run: |
          ls -la dist/

      - name: Create DMG (optional packaging)
        run: |
          # Create a simple zip for distribution
          cd dist && zip -r ${{ env.APP_NAME }}-macOS-Intel.zip ${{ env.APP_NAME }}

      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macOS-Intel
          path: dist/${{ env.APP_NAME }}-macOS-Intel.zip
          if-no-files-found: error

  # ============================================================================
  # Build for macOS (Apple Silicon)
  # ============================================================================
  build-macos-arm:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest  # ARM-based macOS runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        timeout-minutes: 30
        run: |
          pyinstaller PyGameMaker.spec

      - name: List build output
        run: |
          ls -la dist/

      - name: Create archive
        run: |
          cd dist && zip -r ${{ env.APP_NAME }}-macOS-ARM.zip ${{ env.APP_NAME }}

      - name: Upload macOS ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macOS-ARM
          path: dist/${{ env.APP_NAME }}-macOS-ARM.zip
          if-no-files-found: error

  # ============================================================================
  # Build for Linux
  # ============================================================================
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libxkbcommon0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-shape0 \
            libasound2-dev \
            libgl1-mesa-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        timeout-minutes: 30
        run: |
          pyinstaller PyGameMaker.spec

      - name: List build output
        run: |
          ls -la dist/

      - name: Create tarball
        run: |
          cd dist && tar -czvf ${{ env.APP_NAME }}-Linux.tar.gz ${{ env.APP_NAME }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Linux
          path: dist/${{ env.APP_NAME }}-Linux.tar.gz
          if-no-files-found: error

  # ============================================================================
  # Build Python source distribution (pip-installable tarball)
  # ============================================================================
  build-python-package:
    name: Build Python Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build source distribution
        run: |
          python -m build --sdist

      - name: List build output
        run: |
          ls -lh dist/

      - name: Upload Python package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Python-Package
          path: dist/*.tar.gz
          if-no-files-found: error

  # ============================================================================
  # Create Release Assets (on release or manual trigger)
  # ============================================================================
  upload-release:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos-intel, build-macos-arm, build-linux, build-python-package]

    permissions:
      contents: write

    steps:
      - name: Checkout code
        # Needed so we can read CHANGELOG.md to use as the release body.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          find artifacts -type f

      - name: Extract release notes from CHANGELOG
        # Pulls the section for the current tag out of CHANGELOG.md so the
        # release body uses the hand-written notes instead of GitHub's
        # auto-generated PR list. Falls back to an empty file if no
        # matching entry is found, in which case generate_release_notes
        # will fill the body.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > release_notes.md
          if [ -s release_notes.md ]; then
            echo "::group::Extracted release notes for $VERSION"
            cat release_notes.md
            echo "::endgroup::"
          else
            echo "No CHANGELOG entry for $VERSION; will fall back to auto-generated notes."
          fi

      - name: Create Release from version tag
        # Fired when a tag matching v*.*.* is pushed. The action creates
        # the GitHub Release if it doesn't yet exist, otherwise it just
        # attaches the artifacts. Tags containing -rc / -alpha / -beta /
        # -dev are flagged as pre-releases so they don't become "Latest".
        # body_path uses the CHANGELOG excerpt; generate_release_notes
        # appends GitHub's auto-generated "What's Changed" list below it.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-dev') }}
          generate_release_notes: true
          body_path: release_notes.md
          files: |
            artifacts/${{ env.APP_NAME }}-Windows/${{ env.APP_NAME }}.exe
            artifacts/${{ env.APP_NAME }}-macOS-Intel/${{ env.APP_NAME }}-macOS-Intel.zip
            artifacts/${{ env.APP_NAME }}-macOS-ARM/${{ env.APP_NAME }}-macOS-ARM.zip
            artifacts/${{ env.APP_NAME }}-Linux/${{ env.APP_NAME }}-Linux.tar.gz
            artifacts/${{ env.APP_NAME }}-Python-Package/*.tar.gz

      - name: Upload to existing Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/${{ env.APP_NAME }}-Windows/${{ env.APP_NAME }}.exe
            artifacts/${{ env.APP_NAME }}-macOS-Intel/${{ env.APP_NAME }}-macOS-Intel.zip
            artifacts/${{ env.APP_NAME }}-macOS-ARM/${{ env.APP_NAME }}-macOS-ARM.zip
            artifacts/${{ env.APP_NAME }}-Linux/${{ env.APP_NAME }}-Linux.tar.gz
            artifacts/${{ env.APP_NAME }}-Python-Package/*.tar.gz

      - name: Create/Update Draft Release (manual builds)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: draft-${{ github.ref_name }}
          name: "Draft Build (${{ github.ref_name }})"
          draft: true
          prerelease: true
          generate_release_notes: false
          body: |
            Draft build from manual workflow run.

            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Build type:** ${{ inputs.build_type }}
          files: |
            artifacts/${{ env.APP_NAME }}-Windows/${{ env.APP_NAME }}.exe
            artifacts/${{ env.APP_NAME }}-macOS-Intel/${{ env.APP_NAME }}-macOS-Intel.zip
            artifacts/${{ env.APP_NAME }}-macOS-ARM/${{ env.APP_NAME }}-macOS-ARM.zip
            artifacts/${{ env.APP_NAME }}-Linux/${{ env.APP_NAME }}-Linux.tar.gz
            artifacts/${{ env.APP_NAME }}-Python-Package/*.tar.gz
